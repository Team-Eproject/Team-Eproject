services:
  web:
    build:
      context: ./backend
      dockerfile: Docker/Dockerfile

    container_name: hanzo_web_prod
    restart: unless-stopped

    env_file:
      - .env.prod

    environment:
      DJANGO_SETTINGS_MODULE: config.settings

    ports:
      # ALBのターゲットグループをEC2:8000に向ける場合
      - "8000:8000"