<h2>食品登録</h2>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}

 

    <div>
        <label>食品名</label>
        {{ form.name }}
    </div>

    <div>
        <label>画像</label>
        {{ form.image }}
    </div>

    <div>
        <label>数量</label>
        {{ form.quantity }}
    </div>

    <div>
        <label>賞味期限</label>
        {{ form.expiration_date }}
    </div>

    <div>
        <label>期限なし</label>
        {{ form.no_expiration_date }}
    </div>

    <div>
        <label>カテゴリー</label>
        {{ form.category }}
    </div>

    <div>
        <label>カテゴリーを手入力</label>
        {{ form.custom_category }}
    </div>

    <button type="submit">登録</button>

    <a href="{% url 'foods:home' %}">× 取り消し</a>
</form>
