<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Memo</title>

  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      background: #fffef8;
    }

    .title-input {
      width: 100%;
      font-size: 32px;
      font-weight: bold;
      border: none;
      outline: none;
      margin-bottom: 20px;
    }

    .content-input {
      width: 100%;
      min-height: 400px;
      font-size: 18px;
      border: none;
      outline: none;
      resize: none;
      line-height: 1.8;
    }
  </style>
</head>
<body>

  <input
    type="text"
    class="title-input"
    placeholder="タイトル"
  >

  <textarea
    class="content-input"
    placeholder="メモを入力..."
  ></textarea>

</body>
</html>
