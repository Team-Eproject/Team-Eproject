services:
  db:
    image: mysql:8.0
    container_name: hanzo_db
    restart: unless-stopped

    env_file:
      - .env.dev

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

    command:
      [
        "mysqld",
        "--character-set-server=utf8mb4",
        "--collation-server=utf8mb4_0900_ai_ci"
      ]

    volumes:
      - db_data:/var/lib/mysql

    ports:
      - "3306:3306"

    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD}"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./backend
      dockerfile: Docker/Dockerfile

    container_name: hanzo_web
    restart: unless-stopped

    env_file:
      - .env.dev

    depends_on:
      db:
        condition: service_healthy

    volumes:
      # 開発中はコード変更を即反映しやすいようにマウント
      - ./backend:/app

    ports:
      - "8000:8000"

    environment:
      DJANGO_SETTINGS_MODULE: config.settings

volumes:
  db_data: